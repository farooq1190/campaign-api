<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Analytics — Login</title>
    <link rel="stylesheet" href="/frontend/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="auth-body">

    <div class="auth-container">

        <!-- LEFT SIDE — Visual Panel -->
        <div class="auth-visual">
            <div class="visual-overlay"></div>
            <div class="visual-content">
                <div class="brand">
                    <div class="brand-icon">📊</div>
                    <h1 class="brand-name">CampaignIQ</h1>
                </div>
                <div class="visual-stats">
                    <div class="stat-card-mini">
                        <span class="stat-value">5x</span>
                        <span class="stat-label">Average ROAS</span>
                    </div>
                    <div class="stat-card-mini">
                        <span class="stat-value">2.8%</span>
                        <span class="stat-label">Avg CTR</span>
                    </div>
                    <div class="stat-card-mini">
                        <span class="stat-value">₹70</span>
                        <span class="stat-label">Avg CPL</span>
                    </div>
                </div>
                <div class="visual-chart-container">
                    <canvas id="previewChart"></canvas>
                </div>
                <p class="visual-tagline">
                    Track every campaign. Measure every rupee.<br>
                    Make data-driven decisions.
                </p>
            </div>
        </div>

        <!-- RIGHT SIDE — Auth Form -->
        <div class="auth-form-panel">
            <div class="auth-form-container">

                <!-- Tabs -->
                <div class="auth-tabs">
                    <button class="tab-btn active" onclick="showTab('login')">Sign In</button>
                    <button class="tab-btn" onclick="showTab('register')">Create Account</button>
                </div>

                <!-- Login Form -->
                <div id="login-form" class="auth-form active">
                    <h2 class="form-title">Welcome back</h2>
                    <p class="form-subtitle">Sign in to your campaign dashboard</p>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="login-email" placeholder="you@example.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="login-password" placeholder="Enter your password">
                    </div>

                    <div id="login-error" class="error-msg hidden"></div>

                    <button class="btn-primary" onclick="handleLogin()">
                        Sign In
                    </button>
                </div>

                <!-- Register Form -->
                <div id="register-form" class="auth-form">
                    <h2 class="form-title">Get started</h2>
                    <p class="form-subtitle">Create your free account today</p>

                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="reg-username" placeholder="Your name">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="reg-email" placeholder="you@example.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="reg-password" placeholder="Create a password">
                    </div>

                    <div id="register-error" class="error-msg hidden"></div>
                    <div id="register-success" class="success-msg hidden"></div>

                    <button class="btn-primary" onclick="handleRegister()">
                        Create Account
                    </button>
                </div>

            </div>
        </div>
    </div>

    <script>
        const API = "https://campaign-api-production-ade3.up.railway.app";

        // ── TAB SWITCHING ────────────────────────────────────────────────
        function showTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            document.querySelector(`#${tab}-form`).classList.add('active');
            event.target.classList.add('active');
            clearMessages();
        }

        function clearMessages() {
            document.querySelectorAll('.error-msg, .success-msg').forEach(el => {
                el.classList.add('hidden');
                el.textContent = '';
            });
        }

        // ── LOGIN ────────────────────────────────────────────────────────
        async function handleLogin() {
            const email    = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value.trim();
            const errorEl  = document.getElementById('login-error');

            if (!email || !password) {
                showError(errorEl, 'Please fill in all fields');
                return;
            }

            try {
                const res = await fetch(`${API}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.access_token);
                    window.location.href = 'dashboard.html';
                } else {
                    showError(errorEl, data.error || 'Login failed');
                }
            } catch (err) {
                showError(errorEl, 'Cannot connect to server. Please try again.');
            }
        }

        // ── REGISTER ─────────────────────────────────────────────────────
        async function handleRegister() {
            const username = document.getElementById('reg-username').value.trim();
            const email    = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value.trim();
            const errorEl  = document.getElementById('register-error');
            const successEl = document.getElementById('register-success');

            if (!username || !email || !password) {
                showError(errorEl, 'Please fill in all fields');
                return;
            }

            try {
                const res = await fetch(`${API}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    successEl.textContent = 'Account created! Please sign in.';
                    successEl.classList.remove('hidden');
                    setTimeout(() => showTab('login'), 2000);
                } else {
                    showError(errorEl, data.error || 'Registration failed');
                }
            } catch (err) {
                showError(errorEl, 'Cannot connect to server. Please try again.');
            }
        }

        // ── HELPERS ──────────────────────────────────────────────────────
        function showError(el, msg) {
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        // ── PREVIEW CHART ────────────────────────────────────────────────
        window.onload = function() {
            if (localStorage.getItem('token')) {
                window.location.href = 'dashboard.html';
            }

            const ctx = document.getElementById('previewChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                    datasets: [{
                        label: 'Revenue (₹K)',
                        data: [42, 58, 75, 91, 110, 130],
                        backgroundColor: 'rgba(127, 119, 221, 0.7)',
                        borderColor: '#7F77DD',
                        borderWidth: 2,
                        borderRadius: 6,
                    }, {
                        label: 'Spend (₹K)',
                        data: [20, 25, 30, 35, 40, 45],
                        backgroundColor: 'rgba(29, 158, 117, 0.7)',
                        borderColor: '#1D9E75',
                        borderWidth: 2,
                        borderRadius: 6,
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            labels: { color: '#E0DEF4', font: { family: 'Inter', size: 11 } }
                        }
                    },
                    scales: {
                        x: { ticks: { color: '#9896B8' }, grid: { color: 'rgba(255,255,255,0.05)' } },
                        y: { ticks: { color: '#9896B8' }, grid: { color: 'rgba(255,255,255,0.05)' } }
                    }
                }
            });
        };
    </script>
</body>
</html>
